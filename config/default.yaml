# DRS configuration — see docs/USER_GUIDE.md for full explanation

mode: file  # file = recorded video | live = USB/RTSP cameras

video: "lbw.mp4"

detection:
  mode: color  # color (fast) | hybrid (live, needs YOLO)

ball:
  hsv:
    hmin: 10
    smin: 44
    vmin: 192
    hmax: 125
    smax: 114
    vmax: 255

batsman:
  rgb_lower: [112, 0, 181]
  rgb_upper: [255, 255, 255]

thresholds:
  pitch_area_min: 50000
  batsman_area_min: 5000
  pitch_stable_frames: 5
  delivery_motion_min_px: 4
  delivery_motion_frames: 2
  impact_distance_px: 15
  impact_batleg_px: 25

performance:
  detection_scale: 0.5
  pitch_cache_frames: 30

buffer_seconds: 30

ground_id: "default"
calibration_file: ""   # e.g. config/calibration/club_ground.json

diagram:
  enabled: true

live:
  detection_mode: hybrid
  config_file: "config/match.yaml"
