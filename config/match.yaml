# Live camera config — copy and edit camera index or RTSP URL

mode: live

cameras:
  primary:
    type: usb
    source: 0
    enabled: true
  secondary:
    type: usb
    source: 1
    enabled: false

detection:
  mode: hybrid

performance:
  detection_scale: 0.35

live:
  detection_mode: hybrid

buffer_seconds: 60

recording:
  enabled: true
  segment_minutes: 45
  width: 1280

clip:
  pre_roll_seconds: 12
  post_roll_seconds: 8

diagram:
  enabled: true
